<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCDE - IPVT | User Management</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/NEW-LOGO-QCDE.png">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Main user management screen. -->
    <main class="dashboard">
        <!-- Top bar with title, settings, and logout controls. -->
        <section id="dashboard-title">
            <img src="assets/icons/NEW-LOGO-QCDE.png">
            <h1>QCDE - IPVT (User Management)</h1>
            <div class="user-role-wrap">
                <span class="user-role-label"></span>
                <button type="button" class="settings-btn settings-icon-btn" id="settings-btn" aria-label="Edit username and password">
                    <img src="assets/icons/setting.png" class="icons">
                </button>
                <button id="logout-btn" class="logout-btn" data-logout-message="Are you sure you want to log out?">
                    <img src="assets/icons/log-out.png" class="icons">
                </button>
            </div>
        </section>

        <!-- Content wrapper for admin actions and the account table. -->
        <div id="project-container">
            <!-- Toolbar for creating accounts and filtering the list. -->
            <section id="project-toolbar">
                <div class="action-bar">
                    <button type="button" class="action-btn" id="btn-create-admin">
                        <img src="assets/add-project.png" class="icons" style="width: 30px; height: 30px;"> CREATE ADMIN ACCOUNT
                    </button>
                </div>
                <div class="project-search-wrap">
                    <span class="project-search-icon">
                        <img src="assets/search.png">
                    </span>
                    <input type="text" id="admin-search-input" class="project-search-input" placeholder="Search admin accounts" autocomplete="off">
                </div>
            </section>

            <!-- Scrollable admin table with shared dashboard styling. -->
            <div class="project-table-scroll" id="admin-table-scroll">
                <section id="project-container-header">
                    <p>ID</p>
                    <p>Username</p>
                    <p>Status</p>
                    <p id="header-action">Actions</p>
                </section>
                <!-- Admin rows are rendered here dynamically. -->
                <section class="project-list" id="admin-list"></section>
            </div>
        </div>

        <!-- Empty-state message shown when no admin accounts exist. -->
        <p class="empty-state" id="admin-empty-state">No admin accounts yet. Create one to get started.</p>
    </main>

    <!-- Modal for creating a new administrator account. -->
    <div class="modal-overlay" id="create-admin-modal">
        <div class="modal">
            <h2>CREATE ADMIN ACCOUNT</h2>
            <div class="form-group">
                <label for="create-admin-username">Username</label>
                <input type="text" id="create-admin-username" placeholder="Username" maxlength="40">
            </div>
            <div class="form-group">
                <label for="create-admin-name">Name</label>
                <input type="text" id="create-admin-name" placeholder="Full Name" maxlength="80">
            </div>
            <div class="form-group">
                <label for="create-admin-password">Password</label>
                <input type="password" id="create-admin-password" placeholder="Password" maxlength="80">
            </div>
            <p class="modal-error" id="create-admin-error" role="alert"></p>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="create-admin-cancel">Cancel</button>
                <button type="button" class="btn-primary" id="create-admin-submit">Create</button>
            </div>
        </div>
    </div>

    <!-- Modal for editing account details or profile settings. -->
    <div class="modal-overlay" id="edit-admin-modal">
        <div class="modal" id="edit-admin-modal-content">
            <h2 id="edit-admin-title">UPDATE ADMIN ACCOUNT</h2>
            <div class="form-group">
                <label for="edit-admin-username">Username</label>
                <input type="text" id="edit-admin-username" placeholder="Username" maxlength="40">
            </div>
            <div class="form-group" id="edit-admin-name-group">
                <label for="edit-admin-name">Name</label>
                <input type="text" id="edit-admin-name" placeholder="Full Name" maxlength="80">
            </div>
            <div class="form-group" id="edit-admin-status-group">
                <label for="edit-admin-status">Status</label>
                <select id="edit-admin-status">
                    <option value="Active">Active</option>
                    <option value="Suspended">Suspended</option>
                </select>
            </div>
            <div class="form-group">
                <label for="edit-admin-password">New Password (optional)</label>
                <input type="password" id="edit-admin-password" placeholder="Leave blank to keep current password" maxlength="80">
            </div>
            <p class="modal-error" id="edit-admin-error" role="alert"></p>
            <div class="modal-actions">
                <button type="button" class="btn-secondary" id="edit-admin-cancel">Cancel</button>
                <button type="button" class="btn-primary" id="edit-admin-save">Save</button>
            </div>
        </div>
    </div>

    <!-- Loads account management logic and shared login checks. -->
    <script src="js/user-management.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
