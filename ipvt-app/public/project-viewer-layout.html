<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QCDE - IPVT</title>
    <link rel="icon" type="image/x-icon" href="assets/icons/NEW-LOGO-QCDE.png"> 
    <link rel="stylesheet" href="css/main.css">
</head>
<body class="viewer viewer-fixed" data-view-mode="layout">
    <!-- Viewer header with the project title and sidebar toggle. -->
    <header id="pano-header">
        <div id="pano-header-title">
            <span id="pano-header-text"></span>
        </div>
        <img id="dep_logo" src="assets/icons/NEW-LOGO-QCDE.png"> 
        <!-- Sidebar locked to layout mode for this page. -->
        <div id="pano-sidebar-wrapper">
            <aside id="pano-sidebar-container">
                <!-- Viewer tabs allow switching between panorama and layout pages. -->
                <div id="pano-sidebar-tabs" class="viewer-tabs">
                    <button id="viewer-pano-toggle" type="button">Panoramas</button>
                    <button id="pano-layout-toggle" type="button">Layout</button>
                </div>
                <!-- Available layouts are listed here. -->
                <div id="pano-sidebar-content">
                    <ul id="pano-layout-list"></ul>
                </div>
            </aside>
            <button id="pano-sidebar-btn">
                <img src="assets/side-bar-hide.png">
            </button>
        </div>
    </header>
    <!-- Main viewing surface for the selected item. -->
    <main id="pano-panel">
        <div id="pano-viewer"></div>
    </main>

    <!-- Modal used to show the full project name when needed. -->
    <div class="modal-overlay" id="project-name-modal">
        <div class="modal viewer-project-name-modal">
            <h2>PROJECT NAME</h2>
            <p id="project-fullname-text"></p>
            <div class="modal-actions">
                <button type="button" class="btn-primary" id="project-name-modal-close">Close</button>
            </div>
        </div>
    </div>
    <!-- Loads viewer interactions and shared login checks. -->
    <script type="module" src="js/project-viewer.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
